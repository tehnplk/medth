server {
    listen 80;
    server_name medthscphpl.online www.medthscphpl.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name medthscphpl.online www.medthscphpl.online;

    ssl_certificate /etc/letsencrypt/live/medthscphpl.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medthscphpl.online/privkey.pem;

    # เพิ่มให้รองรับ connection ยาว ๆ
    keepalive_timeout 65;

    location / {
        proxy_pass http://127.0.0.1:3001;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 🔥 สำคัญสำหรับ SSE
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    location /nginx-health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }
}
